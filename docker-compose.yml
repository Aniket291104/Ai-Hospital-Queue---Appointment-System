version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: hospitalai_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:alpine
    container_name: hospitalai_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: hospitalai_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/hospitalai
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongodb
      - redis

  frontend:
    build: ./frontend
    container_name: hospitalai_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  mongo_data:
